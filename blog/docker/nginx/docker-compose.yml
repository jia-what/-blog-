version: "3"
services:
  nginx:
    image: nginx:1.18.0
    container_name: nginx
    restart: always
    network_mode: host
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /opt/nginx/etc/nginx.conf:/etc/nginx/nginx.conf
      - /opt/nginx/etc/conf.d:/etc/nginx/conf.d
      - /opt/nginx/logs:/var/log/nginx
